<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

     <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#d9d9d9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .hero{
            width:1100px;
            height:600px;
            display:flex;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .left{
            width:50%;
            background:#000;
            color:#fff;
            padding:70px 60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left h1{
            font-size:60px;
            font-family:Georgia, serif;
            line-height:1.1;
            margin-bottom:20px;
        }

        .left p{
            color:#bdbdbd;
            margin-bottom:35px;
            font-size:18px;
        }

        .buttons{
            display:flex;
            gap:15px;
            margin-bottom:70px;
        }

        .btn-white{
            background:#fff;
            color:#000;
            padding:12px 25px;
            border-radius:5px;
            text-decoration:none;
            font-weight:bold;
        }

        .btn-outline-light{
            padding:12px 25px;
        }

        .features{
            display:flex;
            justify-content:space-between;
            text-align:center;
        }

        .feature i{
            font-size:30px;
            margin-bottom:15px;
        }

        .feature p{
            font-size:14px;
            color:#cfcfcf;
            margin:0;
        }

        .social{
            margin-top:50px;
        }

        .social i{
            margin-right:20px;
            cursor:pointer;
        }

        .right{
            width:50%;
        }

        .right img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        @media(max-width:768px){

            .hero{
                flex-direction:column;
                width:95%;
                height:auto;
            }

            .left,.right{
                width:100%;
            }

            .left{
                padding:40px 30px;
            }

            .left h1{
                font-size:42px;
            }

            .buttons{
                flex-direction:column;
            }

            .features{
                flex-direction:column;
                gap:30px;
            }
        }
    </style>
</head>
<body class="bg-black">
   

    <!-- about  -->


<div class="hero">

    <div class="left">

        <h1 style="color: #5e4e20f3">Unleash Your<br>Inner Radiance</h1>

        <p style="color: #d9b7509e;">
            Look effortlessly radiant with easy-to-apply products that save
            time and feel like you.
        </p>

        <div class="buttons">
            <a href="#" class="btn-white">Shop Quick Beauty Kits</a>
            <a href="#" class="btn btn-out">Watch 2 Minute Tutorial</a>
        </div>

        <div class="features">

            <div class="feature">
                <i class="bi bi-droplet-fill"></i>
                <p>Safe, clean<br>ingredients loved by all</p>
            </div>

            <div class="feature">
                <i class="bi bi-award-fill"></i>
                <p>Fast & flawless<br>routine for mornings</p>
            </div>

            <div class="feature">
                <i class="bi bi-stars"></i>
                <p>No animal testing<br>ever. Certified cruelty free.</p>
            </div>

        </div>

        <div class="social">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-instagram"></i>
            <i class="bi bi-twitter-x"></i>
        </div>

    </div>

    <div class="right">
        <!-- Replace with your own image -->
        <img src="https://i.pinimg.com/736x/a7/2f/b5/a72fb5b834bd0bdc0be63fd7439f6d3c.jpg" alt="Beauty Model">
    </div>

</div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

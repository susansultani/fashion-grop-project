<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#d9d9d9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .hero{
            width:1100px;
            height:600px;
            display:flex;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .left{
            width:50%;
            background:#000;
            color:#fff;
            padding:70px 60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left h1{
            font-size:60px;
            font-family:Georgia, serif;
            line-height:1.1;
            margin-bottom:20px;
        }

        .left p{
            color:#bdbdbd;
            margin-bottom:35px;
            font-size:18px;
        }

        .buttons{
            display:flex;
            gap:15px;
            margin-bottom:70px;
        }

        .btn-white{
            background:#fff;
            color:#000;
            padding:12px 25px;
            border-radius:5px;
            text-decoration:none;
            font-weight:bold;
        }

        .btn-outline-light{
            padding:12px 25px;
        }

        .features{
            display:flex;
            justify-content:space-between;
            text-align:center;
        }

        .feature i{
            font-size:30px;
            margin-bottom:15px;
        }

        .feature p{
            font-size:14px;
            color:#cfcfcf;
            margin:0;
        }

        .social{
            margin-top:50px;
        }

        .social i{
            margin-right:20px;
            cursor:pointer;
        }

        .right{
            width:50%;
        }

        .right img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        @media(max-width:768px){

            .hero{
                flex-direction:column;
                width:95%;
                height:auto;
            }

            .left,.right{
                width:100%;
            }

            .left{
                padding:40px 30px;
            }

            .left h1{
                font-size:42px;
            }

            .buttons{
                flex-direction:column;
            }

            .features{
                flex-direction:column;
                gap:30px;
            }
        }
    </style>
</head>
<body>
    <h1>created</h1>
    

</body>
</html>
